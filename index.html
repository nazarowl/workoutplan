<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athletic Performance Program</title>
<meta name="description" content="Personal athletic workout tracker">
<meta name="theme-color" content="#08080b">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080b; }
  #root { min-height: 100vh; }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  button:focus-visible {
    outline: 2px solid #00d4ff;
    outline-offset: 2px;
  }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const DAYS_DATA = [
  {
    key: "mon", label: "Monday", title: "Upper Body — Power Push", type: "upper", color: "#b366ff",
    blocks: [
      { label: "Warm-Up · 10 min", exercises: ["Band pull-aparts 2×15","Shoulder CARs","T-spine rotation on box","Scap push-ups 2×10"] },
      { label: "Power · 20 min", exercises: ["Plyo Push-Up (hands to box) — 4×5","Med Ball Slam — 4×6","Med Ball Chest Pass — 4×6"] },
      { label: "Strength · 35 min", exercises: ["Push Press — 4×5","Bench Press — 4×6","Landmine Press — 3×8/arm","Band-Resisted Push-Up — 3×10","DB Lateral Raise — 3×12"] },
      { label: "Core + Cooldown · 15 min", exercises: ["Pallof press (band) 3×10/side","Dead bug 3×8/side","Band dislocates + pec stretch"] },
    ],
  },
  {
    key: "tue", label: "Tuesday", title: "Lower Body — Power & Strength", type: "legs", color: "#ffaa00",
    blocks: [
      { label: "Warm-Up · 10 min", exercises: ["Foam roll quads/glutes","Hip 90/90 rotations","Banded lateral walks","Leg swings (front & lateral)"] },
      { label: "Power · 25 min", exercises: ["Hang Power Clean — 5×3","Box Jump (step down, reset) — 4×5","Broad Jump — 4×4","Banded Squat Jump — 3×6"] },
      { label: "Strength · 35 min", exercises: ["Back Squat — 4×5 @ 75-80%","Romanian Deadlift — 3×8","Bulgarian Split Squat — 3×8/leg","Nordic Curl — 3×5","Single-leg calf raise — 3×12"] },
      { label: "Cooldown · 10 min", exercises: ["Banded hip flexor stretch","Pigeon pose 90s/side","Ankle mobility circles"] },
    ],
  },
  {
    key: "wed", label: "Wednesday", title: "Sprint & Conditioning", type: "speed", color: "#00d4ff",
    blocks: [
      { label: "Warm-Up · 10 min", exercises: ["Light jog 400m","A-skips, B-skips","High knees, butt kicks","Banded monster walks"] },
      { label: "Speed · 30 min", exercises: ["Sprint 40m — 6 reps (full rest)","Flying 20s — 4 reps","Band-Resisted Sprint — 5×20m","Hill Sprint — 5×30m"] },
      { label: "Conditioning · 25 min", exercises: ["4 rounds: Box Jump — 8 reps","Broad Jump — 6 reps","200m Run @ 80%","Lateral Bound to Stick — 5/side","Rest 90s between rounds"] },
      { label: "Cooldown · 15 min", exercises: ["400m walk","Hip flexor stretch","Hamstring floss","Deep squat hold 2×30s"] },
    ],
  },
  {
    key: "thu", label: "Thursday", title: "Rest / Active Recovery", type: "rest", color: "#555", blocks: [],
    restMessage: "Light walk or easy bike 20-30 min. Foam rolling full body. Focus on sleep, hydration, and nutrition.",
  },
  {
    key: "fri", label: "Friday", title: "Upper Body — Explosive Pull", type: "pull", color: "#ff4d4d",
    blocks: [
      { label: "Warm-Up · 10 min", exercises: ["Band pull-aparts 2×15","Cat-cow + thread the needle","Banded face pulls 2×12","Arm circles + wrist CARs"] },
      { label: "Power · 20 min", exercises: ["Med Ball Rotational Throw — 4×5/side","Band-Resisted Row (explosive) — 4×8","Hang High Pull — 4×5"] },
      { label: "Strength · 35 min", exercises: ["Weighted Pull-Up — 4×6","Pendlay Row — 4×6","Single-Arm DB Row — 3×8/arm","Band Pull-Apart — 3×15","Barbell Curl — 3×10","Face Pull (band) — 3×15"] },
      { label: "Core + Cooldown · 15 min", exercises: ["Hanging leg raise 3×10","Ab wheel rollout 3×8","Banded shoulder stretch + lats"] },
    ],
  },
  {
    key: "sat", label: "Saturday", title: "Conditioning + Deep Mobility", type: "mobility", color: "#00e68a",
    blocks: [
      { label: "Conditioning · 35 min", exercises: ["Tempo Run — 20 min @ 70%","Box Step-Up Intervals — 5×10/leg","Band Sprint in Place — 6×20s on / 40s off"] },
      { label: "Mobility Flow · 40 min", exercises: ["Hip Flow: 90/90 → pigeon → frog — 3 rounds","T-Spine: cat-cow → thread the needle — 3 rounds","Ankle: wall stretch + banded dorsiflexion","Shoulders: sleeper stretch + band dislocates","Deep squat hold accumulate 3 min"] },
      { label: "Cooldown · 10 min", exercises: ["Diaphragmatic breathing","Full body scan relaxation","Light static stretching"] },
    ],
  },
  {
    key: "sun", label: "Sunday", title: "Full Rest", type: "rest", color: "#555", blocks: [],
    restMessage: "Complete rest. Light walk if desired. Prep meals and plan the week ahead. This is where adaptation happens.",
  },
];

function getWeekId() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 1);
  const diff = now - start;
  const week = Math.ceil(diff / (7 * 24 * 60 * 60 * 1000));
  return `${now.getFullYear()}-W${week}`;
}

function loadChecked(weekId) {
  try {
    const raw = localStorage.getItem(`workout:${weekId}`);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveChecked(weekId, data) {
  try { localStorage.setItem(`workout:${weekId}`, JSON.stringify(data)); } catch {}
}

function CircleProgress({ percent, color, size = 54, stroke = 4 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 0.5s ease" }} />
    </svg>
  );
}

function CheckIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function ClockIcon() {
  return (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{opacity:0.45}}>
      <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
    </svg>
  );
}

function ChevronIcon({ open }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
      style={{ transition: "transform 0.3s ease", transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>
      <path d="M6 9l6 6 6-6" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function App() {
  const todayIndex = new Date().getDay();
  const todayKey = DAYS_DATA[todayIndex === 0 ? 6 : todayIndex - 1]?.key;

  const [weekId] = useState(getWeekId);
  const [checked, setChecked] = useState(() => loadChecked(weekId));
  const [expandedDay, setExpandedDay] = useState(todayKey);

  const toggle = (dayKey, blockIdx, exIdx) => {
    const id = `${dayKey}-${blockIdx}-${exIdx}`;
    setChecked(prev => {
      const next = { ...prev, [id]: !prev[id] };
      if (!next[id]) delete next[id];
      saveChecked(weekId, next);
      return next;
    });
  };

  const resetWeek = () => {
    setChecked({});
    try { localStorage.removeItem(`workout:${weekId}`); } catch {}
  };

  const getDayProgress = (day) => {
    if (day.type === "rest") return { done: 0, total: 0, pct: 100 };
    let total = 0, done = 0;
    day.blocks.forEach((b, bi) =>
      b.exercises.forEach((_, ei) => {
        total++;
        if (checked[`${day.key}-${bi}-${ei}`]) done++;
      })
    );
    return { done, total, pct: total ? Math.round((done / total) * 100) : 0 };
  };

  const weekTotal = DAYS_DATA.filter(d => d.type !== "rest").reduce((a, d) => {
    const p = getDayProgress(d);
    return { done: a.done + p.done, total: a.total + p.total };
  }, { done: 0, total: 0 });
  const weekPct = weekTotal.total ? Math.round((weekTotal.done / weekTotal.total) * 100) : 0;

  const greeting = () => {
    const h = new Date().getHours();
    if (h < 12) return "Morning";
    if (h < 17) return "Afternoon";
    return "Evening";
  };

  return (
    <div style={{
      minHeight: "100vh", background: "#08080b", color: "#e8e8ed",
      fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif",
    }}>
      <div style={{ maxWidth: 720, margin: "0 auto", padding: "32px 16px 80px" }}>

        {/* Header */}
        <div style={{ marginBottom: 36, animation: "fadeDown 0.5s ease both" }}>
          <div style={{
            fontSize: 13, fontWeight: 600, letterSpacing: "0.12em", textTransform: "uppercase",
            color: "#6a6a80", marginBottom: 6,
          }}>
            Good {greeting()}, N
          </div>
          <h1 style={{
            fontSize: 32, fontWeight: 700, letterSpacing: "-0.02em", lineHeight: 1.15,
            margin: 0, color: "#fff",
          }}>
            Your Athletic Program
          </h1>
          <div style={{
            display: "flex", alignItems: "center", gap: 16, marginTop: 16,
            padding: "14px 18px", background: "#111116", borderRadius: 14,
            border: "1px solid #1e1e28",
          }}>
            <CircleProgress percent={weekPct} color="#00d4ff" size={50} stroke={4} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>Week Progress</div>
              <div style={{ fontSize: 12, color: "#6a6a80", marginTop: 2 }}>
                {weekTotal.done}/{weekTotal.total} exercises completed
              </div>
            </div>
            <button onClick={resetWeek} style={{
              background: "rgba(255,255,255,0.04)", border: "1px solid #2a2a35",
              borderRadius: 8, padding: "6px 12px", color: "#6a6a80", fontSize: 11,
              fontWeight: 600, cursor: "pointer", letterSpacing: "0.04em", transition: "all 0.2s",
            }}
            onMouseEnter={e => { e.target.style.background = "rgba(255,70,70,0.1)"; e.target.style.color = "#ff4d4d"; e.target.style.borderColor = "rgba(255,70,70,0.3)"; }}
            onMouseLeave={e => { e.target.style.background = "rgba(255,255,255,0.04)"; e.target.style.color = "#6a6a80"; e.target.style.borderColor = "#2a2a35"; }}
            >Reset Week</button>
          </div>
        </div>

        {/* Day Cards */}
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {DAYS_DATA.map((day, di) => {
            const isOpen = expandedDay === day.key;
            const isToday = day.key === todayKey;
            const prog = getDayProgress(day);
            const isRest = day.type === "rest";

            return (
              <div key={day.key} style={{
                background: isToday ? "rgba(255,255,255,0.03)" : "#0d0d12",
                border: `1px solid ${isToday ? "rgba(255,255,255,0.1)" : "#1a1a22"}`,
                borderRadius: 14, overflow: "hidden", transition: "all 0.3s ease",
                animation: `fadeUp 0.4s ease ${di * 0.05}s both`,
              }}>
                <button onClick={() => setExpandedDay(isOpen ? null : day.key)} style={{
                  width: "100%", display: "flex", alignItems: "center", gap: 14,
                  padding: "16px 18px", background: "none", border: "none",
                  color: "#e8e8ed", cursor: "pointer", textAlign: "left",
                }}>
                  <div style={{
                    width: 10, height: 10, borderRadius: "50%",
                    background: isRest ? "#333" : day.color,
                    boxShadow: isRest ? "none" : `0 0 8px ${day.color}44`,
                    flexShrink: 0,
                  }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{
                        fontSize: 11, fontWeight: 700, letterSpacing: "0.1em",
                        textTransform: "uppercase", color: "#6a6a80",
                      }}>{day.label}</span>
                      {isToday && (
                        <span style={{
                          fontSize: 9, fontWeight: 700, letterSpacing: "0.08em",
                          textTransform: "uppercase", padding: "2px 7px",
                          borderRadius: 4, background: "rgba(0,212,255,0.12)", color: "#00d4ff",
                        }}>Today</span>
                      )}
                    </div>
                    <div style={{
                      fontSize: 15, fontWeight: 600, color: "#fff",
                      marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                    }}>{day.title}</div>
                  </div>
                  {!isRest ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: prog.pct === 100 ? "#00e68a" : "#6a6a80" }}>{prog.pct}%</div>
                      <CircleProgress percent={prog.pct} color={prog.pct === 100 ? "#00e68a" : day.color} size={32} stroke={3} />
                    </div>
                  ) : (
                    <div style={{ fontSize: 11, color: "#444", fontWeight: 600, letterSpacing: "0.06em", flexShrink: 0 }}>REST</div>
                  )}
                  <div style={{ flexShrink: 0, color: "#555" }}><ChevronIcon open={isOpen} /></div>
                </button>

                <div style={{ maxHeight: isOpen ? 1200 : 0, overflow: "hidden", transition: "max-height 0.4s ease" }}>
                  <div style={{ padding: "0 18px 20px" }}>
                    {isRest ? (
                      <p style={{ fontSize: 13, lineHeight: 1.7, color: "#6a6a80", fontWeight: 300, padding: "4px 0 0 24px" }}>{day.restMessage}</p>
                    ) : (
                      <>
                        {day.blocks.map((block, bi) => (
                          <div key={bi} style={{ marginBottom: bi < day.blocks.length - 1 ? 16 : 0 }}>
                            <div style={{
                              fontSize: 10, fontWeight: 700, letterSpacing: "0.14em",
                              textTransform: "uppercase", color: "#555", marginBottom: 8, paddingLeft: 24,
                            }}>{block.label}</div>
                            {block.exercises.map((ex, ei) => {
                              const id = `${day.key}-${bi}-${ei}`;
                              const isDone = !!checked[id];
                              return (
                                <button key={ei} onClick={() => toggle(day.key, bi, ei)} style={{
                                  display: "flex", alignItems: "flex-start", gap: 10,
                                  width: "100%", padding: "6px 0", background: "none",
                                  border: "none", cursor: "pointer", textAlign: "left", color: "#e8e8ed",
                                }}>
                                  <div style={{
                                    width: 20, height: 20, borderRadius: 6, flexShrink: 0, marginTop: 1,
                                    border: isDone ? "none" : "1.5px solid #333",
                                    background: isDone ? day.color : "transparent",
                                    display: "flex", alignItems: "center", justifyContent: "center",
                                    transition: "all 0.2s ease", color: isDone ? "#000" : "transparent",
                                  }}>{isDone && <CheckIcon />}</div>
                                  <span style={{
                                    fontSize: 13, lineHeight: 1.5, fontWeight: 400,
                                    color: isDone ? "#555" : "#ccc",
                                    textDecoration: isDone ? "line-through" : "none",
                                    transition: "all 0.2s ease",
                                  }}>{ex}</span>
                                </button>
                              );
                            })}
                          </div>
                        ))}
                        <div style={{
                          display: "flex", alignItems: "center", gap: 6,
                          marginTop: 14, paddingTop: 12,
                          borderTop: "1px solid rgba(255,255,255,0.04)",
                          fontSize: 11, color: "#444", fontWeight: 600, letterSpacing: "0.06em",
                        }}><ClockIcon /> ~90 MINUTES</div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Footer Notes */}
        <div style={{ marginTop: 32, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, animation: "fadeUp 0.5s ease 0.4s both" }}>
          {[
            { title: "Key Principles", items: ["Power work always first when fresh","Full rest between sprint/plyo sets (2-3 min)","Stop a set if speed drops off","Sleep 7-9h · 1g protein per lb"] },
            { title: "Equipment", items: ["Barbell, rack, bench, dumbbells","Plyo boxes","Elastic bands","Med balls, ab wheel, foam roller"] },
          ].map((card) => (
            <div key={card.title} style={{
              background: "#0d0d12", border: "1px solid #1a1a22", borderRadius: 14, padding: "18px 20px",
            }}>
              <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#fff", marginBottom: 10 }}>{card.title}</div>
              {card.items.map((item, i) => (
                <div key={i} style={{ fontSize: 12, lineHeight: 1.7, color: "#6a6a80", fontWeight: 300 }}>
                  <span style={{ color: "#00d4ff", fontWeight: 600, marginRight: 6 }}>→</span>{item}
                </div>
              ))}
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
